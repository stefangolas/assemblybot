<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AssemblyBot Viewer</title>
</head>
<body style="margin:0; overflow:hidden;">
  <script>
    (async function() {
      const projectId = window.PROJECT_ID || 'rung3_rotary';
      try {
        const res = await fetch(`/${projectId}/project.json`);
        let assemblyPath = `out/${projectId}_assembly.json`;
        if (res.ok) {
          const pjson = await res.json();
          if (pjson.canonical_assembly) assemblyPath = pjson.canonical_assembly;
        }
        const iframe = document.createElement('iframe');
        iframe.src = `/_app/incr.html?src=/${projectId}/${assemblyPath}`;
        iframe.style.width = '100vw';
        iframe.style.height = '100vh';
        iframe.style.border = 'none';
        document.body.appendChild(iframe);
      } catch (e) {
        console.error('Failed to load project:', e);
      }
    })();
  </script>
</body>
</html>
